name: PR Test Gate

on:
  pull_request:
    paths:
      - 'apps/server/**'
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/**'
  push:
    branches:
      - 'main'
    paths:
      - 'apps/server/**'
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/**'

jobs:
  server-tests:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server test suite
        run: npm -C apps/server test

  web-unit-tests:
    name: Web unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web unit test suite
        run: pnpm -C apps/web test:unit
