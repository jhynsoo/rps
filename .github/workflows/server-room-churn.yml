name: Server Room Churn Baseline

on:
  pull_request:
    paths:
      - 'apps/server/**'
      - '.github/workflows/server-room-churn.yml'
  push:
    branches:
      - 'main'
    paths:
      - 'apps/server/**'
      - '.github/workflows/server-room-churn.yml'

jobs:
  room-churn-baseline:
    name: Run server churn baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20.9.0'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server baseline tests
        run: npm -C apps/server test

      - name: Upload room churn artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-room-churn-artifacts
          path: |
            apps/server/**/*.log
            apps/server/*churn*.log
            apps/server/churn-logs/**
            apps/server/test-results/**
          if-no-files-found: ignore
