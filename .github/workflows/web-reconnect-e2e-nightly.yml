name: Web Reconnect E2E Nightly

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  reconnect-e2e:
    name: Reconnect E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm -C apps/web exec playwright install --with-deps chromium

      - name: Run reconnect/resume E2E suite
        env:
          CI: 'true'
        run: pnpm -C apps/web test:e2e --grep '(reconnect|resume)'

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-reconnect-e2e-artifacts
          path: |
            apps/web/playwright-report/**
            apps/web/test-results/**
          if-no-files-found: ignore
